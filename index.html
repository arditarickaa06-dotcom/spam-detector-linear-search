<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deteksi Nomor Telepon Spam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="judul">

            Deteksi Nomor Telepon Spam

        </h1>

        <p class="subjudul">

            Implementasi Algoritma Linear Search pada Database Blacklist

        </p>

    </div>


    <div class="card shadow-lg">

        <div class="card-header">

            Pemeriksaan Nomor Telepon

        </div>

        <div class="card-body">

            <label class="form-label">

                Nomor Telepon

            </label>

            <input
                type="text"
                id="nomor"
                class="form-control"
                placeholder="Masukkan nomor telepon">

            <div class="text-center mt-4">

                <button
                    class="btn btnPink"
                    onclick="cekNomor()">

                    Cek Nomor

                </button>

                <button
                    class="btn btnReset"
                    onclick="resetForm()">

                    Reset

                </button>

            </div>

        </div>

    </div>


    <div
        class="card shadow-lg mt-4"
        id="hasilCard">

        <div class="card-header">

            Hasil Pencarian

        </div>

        <div class="card-body">

            <table class="table">

                <tr>

                    <th width="40%">

                        Status

                    </th>

                    <td id="status"></td>

                </tr>

                <tr>

                    <th>

                        Posisi Data

                    </th>

                    <td id="posisi"></td>

                </tr>

                <tr>

                    <th>

                        Jumlah Perbandingan

                    </th>

                    <td id="perbandingan"></td>

                </tr>

                <tr>

                    <th>

                        Waktu Eksekusi

                    </th>

                    <td id="waktu"></td>

                </tr>

            </table>

        </div>

    </div>


    <div class="card shadow-lg mt-4">

        <div class="card-header">

            Database Blacklist

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered text-center">

                <thead>

                <tr>

                    <th width="80">

                        No

                    </th>

                    <th>

                        Nomor Telepon

                    </th>

                </tr>

                </thead>

                <tbody id="database">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
